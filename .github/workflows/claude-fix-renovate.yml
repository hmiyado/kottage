name: Claude Fix Renovate PR

# Renovate が作成した PR で CI (ci.yml) が失敗した場合に検知し、
# claude-fix-renovate-run.yml (workflow_dispatch) を起動して Claude に修正を任せる。
#
# claude-code-action (v0.0.63 相当・28f83620...) は workflow_run イベントを
# サポートしていない (parseGitHubContext が対応する event は issues /
# issue_comment / pull_request / pull_request_review /
# pull_request_review_comment / workflow_dispatch / schedule のみ) ため、
# このワークフロー自身では claude-code-action を呼び出さず、
# workflow_dispatch で別ワークフローを起動する二段構成にしている。
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  dispatch:
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: write
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          number=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}" --jq '.pull_requests[0].number')
          if [ -z "$number" ] || [ "$number" = "null" ]; then
            echo "No associated PR found for this workflow run; skipping."
            exit 1
          fi
          echo "number=$number" >> "$GITHUB_OUTPUT"

      # 同じ PR に対して自動修正を無限に繰り返さないためのガード。
      # 1 PR につき 1 回だけ Claude による自動修正を試みる。
      - name: Ensure guard label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "claude-fix-attempted" \
            --repo "${{ github.repository }}" \
            --color "ededed" \
            --description "Renovate PR で Claude による自動修正を試行済み" \
            --force

      - name: Check previous fix attempt
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          already=$(gh pr view "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | index("claude-fix-attempted") != null')
          echo "already_attempted=$already" >> "$GITHUB_OUTPUT"

      - name: Mark fix attempted
        if: steps.guard.outputs.already_attempted == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr edit "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --add-label "claude-fix-attempted"

      - name: Comment when already attempted
        if: steps.guard.outputs.already_attempted == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --body \
            "既に自動修正を1回試みましたが、CI が再度失敗しました。人手での確認をお願いします。"

      - name: Dispatch Claude fix workflow
        if: steps.guard.outputs.already_attempted == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run claude-fix-renovate-run.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f pr_number="${{ steps.pr.outputs.number }}" \
            -f head_branch="${{ github.event.workflow_run.head_branch }}" \
            -f failed_run_id="${{ github.event.workflow_run.id }}"
