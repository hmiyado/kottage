name: Claude Fix Renovate PR

# Renovate が作成した PR で CI (ci.yml) が失敗した場合に、
# claude-code-action の agent モード (prompt 入力による自動化) を使って
# Claude に原因調査・修正を任せる。
#
# claude-code-action v1.0.181 (44423bdec74b...) は workflow_run イベントと
# agent モードでのコミット署名 (ssh_signing_key) を正式にサポートしているため、
# workflow_run で直接起動する一段構成にしている。
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  fix:
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'renovate[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          number=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}" --jq '.pull_requests[0].number')
          if [ -z "$number" ] || [ "$number" = "null" ]; then
            echo "No associated PR found for this workflow run; skipping."
            exit 1
          fi
          echo "number=$number" >> "$GITHUB_OUTPUT"

      # 同じ PR に対して自動修正を無限に繰り返さないためのガード。
      # 1 PR につき 1 回だけ Claude による自動修正を試みる。
      - name: Ensure guard label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "claude-fix-attempted" \
            --repo "${{ github.repository }}" \
            --color "ededed" \
            --description "Renovate PR で Claude による自動修正を試行済み" \
            --force

      - name: Check previous fix attempt
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          already=$(gh pr view "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name] | index("claude-fix-attempted") != null')
          echo "already_attempted=$already" >> "$GITHUB_OUTPUT"

      - name: Mark fix attempted
        if: steps.guard.outputs.already_attempted == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr edit "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --add-label "claude-fix-attempted"

      - name: Comment when already attempted
        if: steps.guard.outputs.already_attempted == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --body \
            "既に自動修正を1回試みましたが、CI が再度失敗しました。人手での確認をお願いします。"

      - uses: actions/checkout@v7
        if: steps.guard.outputs.already_attempted == 'false'
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@44423bdec74b97d67543eb16c110546762c110b2 # v1.0.181
        if: steps.guard.outputs.already_attempted == 'false'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "renovate[bot]"
          ssh_signing_key: ${{ secrets.SSH_SIGNING_KEY }}
          bot_name: "hmiyado"
          bot_id: "10195648"
          claude_args: |
            --model claude-sonnet-5
            --allowedTools Bash
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.pr.outputs.number }}
            FAILED RUN ID: ${{ github.event.workflow_run.id }}

            この PR は Renovate による依存関係更新 PR です。CI ワークフロー「CI」が失敗しました。

            手順:
            1. `gh run view ${{ github.event.workflow_run.id }} --log-failed` で失敗したジョブのログを確認し、原因を特定する。
            2. 依存関係の更新に伴う軽微な問題(API の破壊的変更への追従、lint エラー、型エラー、テストの調整など)であれば、コードを修正する。
            3. 修正した場合は、変更内容が分かる日本語のコミットメッセージで現在のブランチにコミットし、push する。
            4. 大規模な破壊的変更が必要など、自動修正が難しいと判断した場合はコードを変更せず、`gh pr comment ${{ steps.pr.outputs.number }}` で原因と対応方針の提案を日本語でコメントする。

            自分がコミットした変更以外(無関係なファイル)は触らないこと。
