name: Claude Fix Renovate PR (Run)

# claude-fix-renovate.yml から workflow_dispatch で起動される実行本体。
# claude-code-action の agent モード (workflow_dispatch/schedule 専用) を使い、
# direct_prompt で Claude に CI 失敗の調査・修正を指示する。
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "対象 PR 番号"
        required: true
        type: string
      head_branch:
        description: "PR のブランチ名"
        required: true
        type: string
      failed_run_id:
        description: "失敗した CI ワークフローの run id"
        required: true
        type: string

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.head_branch }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@28f83620103c48a57093dcc2837eec89e036bb9f # beta (v0.0.63)
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          mode: agent
          model: claude-sonnet-5
          use_commit_signing: true
          allowed_tools: "Bash"
          direct_prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ inputs.pr_number }}
            FAILED RUN ID: ${{ inputs.failed_run_id }}

            この PR は Renovate による依存関係更新 PR です。CI ワークフロー「CI」が失敗しました。

            手順:
            1. `gh run view ${{ inputs.failed_run_id }} --log-failed` で失敗したジョブのログを確認し、原因を特定する。
            2. 依存関係の更新に伴う軽微な問題(API の破壊的変更への追従、lint エラー、型エラー、テストの調整など)であれば、コードを修正する。
            3. 修正した場合は、変更内容が分かる日本語のコミットメッセージで現在のブランチにコミットし、push する。
            4. 大規模な破壊的変更が必要など、自動修正が難しいと判断した場合はコードを変更せず、`gh pr comment ${{ inputs.pr_number }}` で原因と対応方針の提案を日本語でコメントする。

            自分がコミットした変更以外(無関係なファイル)は触らないこと。
